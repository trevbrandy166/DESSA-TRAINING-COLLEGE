<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Dessa Training College</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dessa: {
                primary: "#1e3a5f",
                secondary: "#d4a017",
                accent: "#e8f4f8",
                dark: "#0f172a",
                light: "#f8fafc",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body
    class="font-sans text-gray-800 bg-dessa-light min-h-screen flex items-center justify-center"
  >
    <div class="w-full max-w-md px-4">
      <div class="text-center mb-8">
        <img
          src="/images/logo.png"
          alt="Dessa Training College"
          class="h-20 mx-auto mb-4"
        />
        <h1 class="text-2xl font-bold text-dessa-primary">Create Account</h1>
        <p class="text-gray-600">Set up your student portal access</p>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-8">
        <form id="register-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Registration Number *</label
            >
            <div class="relative">
              <i
                class="fas fa-id-card absolute left-4 top-3.5 text-gray-400"
              ></i>
              <input
                type="text"
                name="reg_number"
                required
                class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-dessa-primary focus:border-transparent transition outline-none"
                placeholder="DES20261234"
              />
            </div>
            <p class="text-xs text-gray-500 mt-1">
              Enter the registration number sent to your email
            </p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Email Address *</label
            >
            <div class="relative">
              <i
                class="fas fa-envelope absolute left-4 top-3.5 text-gray-400"
              ></i>
              <input
                type="email"
                name="email"
                required
                class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-dessa-primary focus:border-transparent transition outline-none"
                placeholder="john@example.com"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Password *</label
            >
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400"></i>
              <input
                type="password"
                name="password"
                required
                minlength="6"
                class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-dessa-primary focus:border-transparent transition outline-none"
                placeholder="Minimum 6 characters"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >Confirm Password *</label
            >
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400"></i>
              <input
                type="password"
                name="confirm_password"
                required
                class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-dessa-primary focus:border-transparent transition outline-none"
                placeholder="Re-enter password"
              />
            </div>
          </div>

          <button
            type="submit"
            id="submit-btn"
            class="w-full bg-dessa-primary text-white py-3 rounded-lg font-bold hover:bg-dessa-secondary hover:text-dessa-primary transition-all duration-300"
          >
            <span id="btn-text">Create Account</span>
            <span id="btn-loading" class="hidden">
              <i class="fas fa-spinner fa-spin mr-2"></i>Creating...
            </span>
          </button>

          <div
            id="form-message"
            class="hidden rounded-lg p-3 text-center text-sm"
          ></div>
        </form>

        <div class="mt-6 text-center">
          <p class="text-gray-600 text-sm">
            Already have an account?
            <a
              href="/portal/login"
              class="text-dessa-primary font-semibold hover:underline"
              >Login</a
            >
          </p>
        </div>

        <div class="mt-4 text-center">
          <a
            href="/"
            class="text-gray-500 text-sm hover:text-dessa-primary transition"
          >
            <i class="fas fa-arrow-left mr-1"></i> Back to Website
          </a>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("register-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const btn = document.getElementById("submit-btn");
          const btnText = document.getElementById("btn-text");
          const btnLoading = document.getElementById("btn-loading");
          const messageDiv = document.getElementById("form-message");

          // Check passwords match
          if (this.password.value !== this.confirm_password.value) {
            messageDiv.classList.remove("hidden");
            messageDiv.className =
              "rounded-lg p-3 text-center text-sm bg-red-100 text-red-800";
            messageDiv.textContent = "Passwords do not match";
            return;
          }

          btnText.classList.add("hidden");
          btnLoading.classList.remove("hidden");
          btn.disabled = true;

          const formData = {
            reg_number: this.reg_number.value,
            email: this.email.value,
            password: this.password.value,
          };

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(formData),
            });

            const result = await response.json();

            if (response.ok) {
              // Save session
              localStorage.setItem("sessionId", result.sessionId);

              messageDiv.classList.remove("hidden");
              messageDiv.className =
                "rounded-lg p-3 text-center text-sm bg-green-100 text-green-800";
              messageDiv.textContent = "Account created! Redirecting...";

              setTimeout(() => {
                window.location.href = "/portal/dashboard";
              }, 1500);
            } else {
              messageDiv.classList.remove("hidden");
              messageDiv.className =
                "rounded-lg p-3 text-center text-sm bg-red-100 text-red-800";
              messageDiv.textContent = result.error || "Registration failed";
            }
          } catch (error) {
            messageDiv.classList.remove("hidden");
            messageDiv.className =
              "rounded-lg p-3 text-center text-sm bg-red-100 text-red-800";
            messageDiv.textContent = "Network error. Please try again.";
          } finally {
            btnText.classList.remove("hidden");
            btnLoading.classList.add("hidden");
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
